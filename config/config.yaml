data: 
  raw_path: "data/raw/dataset.csv"
  test_size: 0.2 # 20% held out for testing
  random_state: 42 # seed for reproducibility
  target_col: "Failure Type"

model:
  hidden_sizes: [64, 32] # neurons per hidden layer
  dropout: 0.2
  learning_rate: 0.001
  batch_size: 32
  epochs: 40
  early_stopping_patience: 10